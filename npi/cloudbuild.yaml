substitutions:
  _GCSFUSE_VERSION: 'master'
  _GO_VERSION: '1.25.0'
  _UBUNTU_VERSION: '24.04'
  _REGISTRY: 'us-docker.pkg.dev'
  _PROJECT: 'gcs-fuse-test'
  _IMAGE_VERSION: 'latest'
  _PLATFORM: 'linux/amd64,linux/arm64'
  _ARCH_SUFFIX: ''

steps:
  # Set up buildx to use the docker-container driver, which is necessary for multi-platform builds.
  - name: 'gcr.io/cloud-builders/docker'
    id: 'buildx-setup'
    args:
      - 'buildx'
      - 'create'
      - '--use'
      - '--name'
      - 'multi-platform-builder'
      - '--driver'
      - 'docker-container'

  # Build and push the base image.
  - name: 'gcr.io/cloud-builders/docker'
    id: 'base'
    waitFor: ['buildx-setup']
    args:
      - 'buildx'
      - 'build'
      - '--push'
      - '-f'
      - 'gcsfuse-perf-base.dockerfile'
      - '--platform'
      - '${_PLATFORM}'
      - '--build-arg'
      - 'GCSFUSE_VERSION=${_GCSFUSE_VERSION}'
      - '--build-arg'
      - 'GO_VERSION=${_GO_VERSION}'
      - '--build-arg'
      - 'UBUNTU_VERSION=${_UBUNTU_VERSION}'
      - '-t'
      - '${_REGISTRY}/${_PROJECT}/gcsfuse-benchmarks/gcsfuse-perf-base:${_IMAGE_VERSION}${_ARCH_SUFFIX}'
      - '.'

  # Build and push the read-benchmark image.
  - name: 'gcr.io/cloud-builders/docker'
    id: 'read-benchmark'
    waitFor: ['base']
    args:
      - 'buildx'
      - 'build'
      - '--push'
      - '-f'
      - 'fio/read.dockerfile'
      - '--platform'
      - '${_PLATFORM}'
      - '--build-arg'
      - 'GCSFUSE_VERSION=${_GCSFUSE_VERSION}'
      - '--build-arg'
      - 'GO_VERSION=${_GO_VERSION}'
      - '--build-arg'
      - 'UBUNTU_VERSION=${_UBUNTU_VERSION}'
      - '--build-arg'
      - 'REGISTRY=${_REGISTRY}'
      - '--build-arg'
      - 'PROJECT=${_PROJECT}'
      - '--build-arg'
      - 'IMAGE_VERSION=${_IMAGE_VERSION}${_ARCH_SUFFIX}'
      - '-t'
      - '${_REGISTRY}/${_PROJECT}/gcsfuse-benchmarks/fio-read-benchmark:${_IMAGE_VERSION}${_ARCH_SUFFIX}'
      - 'fio'

  # Build and push the go-client-read-benchmark image.
  - name: 'gcr.io/cloud-builders/docker'
    id: 'go-client-read-benchmark'
    waitFor: ['base']
    args:
      - 'buildx'
      - 'build'
      - '--push'
      - '-f'
      - 'go-client/go-client.dockerfile'
      - '--platform'
      - '${_PLATFORM}'
      - '--build-arg'
      - 'GO_VERSION=${_GO_VERSION}'
      - '--build-arg'
      - 'REGISTRY=${_REGISTRY}'
      - '--build-arg'
      - 'PROJECT=${_PROJECT}'
      - '--build-arg'
      - 'IMAGE_VERSION=${_IMAGE_VERSION}${_ARCH_SUFFIX}'
      - '-t'
      - '${_REGISTRY}/${_PROJECT}/gcsfuse-benchmarks/go-client-read-benchmark:${_IMAGE_VERSION}${_ARCH_SUFFIX}'
      - 'go-client'

  # Build and push the write-benchmark image.
  - name: 'gcr.io/cloud-builders/docker'
    id: 'write-benchmark'
    waitFor: ['base']
    args:
      - 'buildx'
      - 'build'
      - '--push'
      - '-f'
      - 'fio/write.dockerfile'
      - '--platform'
      - '${_PLATFORM}'
      - '--build-arg'
      - 'GCSFUSE_VERSION=${_GCSFUSE_VERSION}'
      - '--build-arg'
      - 'GO_VERSION=${_GO_VERSION}'
      - '--build-arg'
      - 'UBUNTU_VERSION=${_UBUNTU_VERSION}'
      - '--build-arg'
      - 'REGISTRY=${_REGISTRY}'
      - '--build-arg'
      - 'PROJECT=${_PROJECT}'
      - '--build-arg'
      - 'IMAGE_VERSION=${_IMAGE_VERSION}${_ARCH_SUFFIX}'
      - '-t'
      - '${_REGISTRY}/${_PROJECT}/gcsfuse-benchmarks/fio-write-benchmark:${_IMAGE_VERSION}${_ARCH_SUFFIX}'
      - 'fio'

  # Build and push the host-info-collector image.
  - name: 'gcr.io/cloud-builders/docker'
    id: 'host-info-collector'
    waitFor: ['base']
    args:
      - 'buildx'
      - 'build'
      - '--push'
      - '-f'
      - 'host_info/host_info.dockerfile'
      - '--platform'
      - '${_PLATFORM}'
      - '--build-arg'
      - 'GCSFUSE_VERSION=${_GCSFUSE_VERSION}'
      - '--build-arg'
      - 'GO_VERSION=${_GO_VERSION}'
      - '--build-arg'
      - 'UBUNTU_VERSION=${_UBUNTU_VERSION}'
      - '--build-arg'
      - 'REGISTRY=${_REGISTRY}'
      - '--build-arg'
      - 'PROJECT=${_PROJECT}'
      - '--build-arg'
      - 'IMAGE_VERSION=${_IMAGE_VERSION}${_ARCH_SUFFIX}'
      - '-t'
      - '${_REGISTRY}/${_PROJECT}/gcsfuse-benchmarks/host-info-collector:${_IMAGE_VERSION}${_ARCH_SUFFIX}'
      - 'host_info'

  # Build and push the routing init-container image.
  - name: 'gcr.io/cloud-builders/docker'
    id: 'routing'
    waitFor: ['buildx-setup']
    args:
      - 'buildx'
      - 'build'
      - '--push'
      - '-f'
      - 'multinic/routing.dockerfile'
      - '--platform'
      - '${_PLATFORM}'
      - '-t'
      - '${_REGISTRY}/${_PROJECT}/gcsfuse-benchmarks/multinic-routing:${_IMAGE_VERSION}${_ARCH_SUFFIX}'
      - 'multinic'

options:
  # Using a more powerful machine is recommended for multi-platform builds.
  machineType: 'E2_HIGHCPU_32'
